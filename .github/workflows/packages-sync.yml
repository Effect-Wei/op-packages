name: Update OpenWrt APK Repo

on:
  schedule:
    - cron: '0 2 * * *' # 每天凌晨2点自动运行
  workflow_dispatch: # 允许手动点击触发

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    container: alpine:latest # 直接使用 Alpine 镜像，原生支持 apk 工具链

    steps:
      - name: Install Dependencies
        run: |
          apk update
          apk add bash curl jq openssl abuild aws-cli

      - name: Setup Abuild Key
        run: |
          mkdir -p ~/.abuild
          echo "${{ secrets.ABUILD_PRIVATE_KEY }}" > ~/.abuild/effectw.rsa
          # 必须生成对应公钥以便 abuild-sign 验证
          openssl rsa -in ~/.abuild/effectw.rsa -pubout -out ~/.abuild/effectw.pub
          chmod 600 ~/.abuild/effectw.rsa

      - name: Configure AWS CLI for Cloudflare R2
        run: |
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set default.region auto

      - name: Pull Existing Packages from R2
        run: |
          mkdir -p /repo/x86_64
          # 从 R2 同步现有文件到本地容器。
          # 加上 || true 防止首次运行（Bucket为空）时报错中断
          aws s3 sync s3://${{ secrets.R2_BUCKET }}/x86_64 /repo/x86_64 \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} || true

      - name: Run Fetch Script
        shell: bash
        run: |
          cd /repo/x86_64
          
          # 定义目标列表
          TARGETS=("jerrykuku/luci-theme-argon|luci-theme-argon-*.apk" "vernesong/OpenClash|luci-app-openclash-*.apk")
          
          for TARGET in "${TARGETS[@]}"; do
              REPO_NAME="${TARGET%|*}"
              KEYWORD="${TARGET#*|}"
              REGEX_KEYWORD=$(echo "$KEYWORD" | sed 's/\*/.*/g')
              
              URLS=$(curl -s "https://api.github.com/repos/$REPO_NAME/releases/latest" | jq -r ".assets[] | select(.name | test(\"$REGEX_KEYWORD\")) | .browser_download_url")
              
              for URL in $URLS; do
                  FILENAME=$(basename "$URL")
                  # 增量判断：如果文件已存在（从 R2 拉下来的旧包包含此版本），则跳过下载
                  if [ ! -f "$FILENAME" ]; then
                      echo "Downloading new package: $FILENAME"
                      curl -L -O "$URL"
                  else
                      echo "Package $FILENAME already exists, skipping download."
                  fi
              done
          done

          # 清理旧的索引文件（防止打包出现嵌套或冲突）
          rm -f APKINDEX.tar.gz
          
          # 重新生成索引（此时 *.apk 包含了 R2 里的旧包和刚才下载的新包）
          echo "Generating new APKINDEX..."
          apk index --allow-untrusted -o APKINDEX.tar.gz *.apk
          
          # 签名
          abuild-sign -k ~/.abuild/effectw.rsa APKINDEX.tar.gz

      - name: Sync to Cloudflare R2
        run: |
          aws s3 cp ~/.abuild/effectw.pub s3://${{ secrets.R2_BUCKET }}/effectw.pub \
            --endpoint-url ${{ secrets.R2_ENDPOINT }}

          # 使用 aws s3 sync 上传到 R2
          aws s3 sync /repo/x86_64 s3://${{ secrets.R2_BUCKET }}/x86_64 \
            --endpoint-url ${{ secrets.R2_ENDPOINT }}
